<!DOCTYPE html>
<html>
<head>
    <title>Data Entry App</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        form { display: flex; flex-direction: column; width: 300px; }
        input, textarea, button { margin-top: 10px; padding: 8px; }
    </style>
</head>
<body>
    <h1>Enter Data</h1>
    <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Save Data</button>
    </form>

    <h2>Stored Data Options</h2>
    <a href="/print_pdf">Generate and Print All Data as PDF</a>

</body>
</html>
